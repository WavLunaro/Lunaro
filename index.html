<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Lunaro | Music • Emotion • Vibes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --purple: #8b5cf6;
      --blue: #38bdf8;
      --bg-dark: #050508;
      --card-bg: rgba(10, 10, 20, 0.85);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      background:
        linear-gradient(to bottom, rgba(5,5,8,0.9), rgba(5,5,8,1)),
        url("banner.jpg") center / cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 28px 22px 32px;
      text-align: center;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.25);
    }

    h1 {
      margin: 10px 0 4px;
      font-size: 2.4rem;
      background: linear-gradient(90deg, var(--purple), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .tagline {
      font-size: 0.85rem;
      letter-spacing: 2px;
      opacity: 0.8;
      margin-bottom: 24px;
    }

    .link {
      display: block;
      padding: 14px;
      margin: 14px 0;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg, var(--purple), var(--blue));
      box-shadow: 0 0 15px rgba(139,92,246,0.6);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .link:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(56,189,248,0.9);
    }

    footer {
      margin-top: 24px;
      font-size: 0.7rem;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>LUNARO</h1>
    <div class="tagline">MUSIC • EMOTION • VIBES</div>

    <a class="link" href="https://discord.gg/aMxjbC4sb7" target="_blank">
      Discord
    </a>

    <a class="link" href="https://www.instagram.com/wav.lunaro" target="_blank">
      Instagram
    </a>

    <a class="link" href="https://www.tiktok.com/@wav.lunaro" target="_blank">
      TikTok
    </a>

    <footer>
      © Lunaro
    </footer>
  </div>
</body>
</html>
